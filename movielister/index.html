<!DOCTYPE html>
<html lang="en" ng-app="myApp">
  <head>
    <meta charset="utf-8">
    <title>Movie List</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.6/css/bootstrap.min.css" charset="utf-8">
    <script>window.$ = window.jQuery = require('./lib/jquery.min.js');</script>
    <!-- <script src="//code.jquery.com/jquery-1.12.0.min.js"></script> -->
    <!-- bootstrap 대신 material-design-lite 사용 -->
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.6/js/bootstrap.min.js"></script>

    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.4.8/angular.min.js"></script>
    <script src="https://code.angularjs.org/1.5.0-rc.0/angular-route.min.js"></script>
    <link rel="stylesheet" href="css/style.css"charset="utf-8">
    <script src="js/app.js"></script>
    <script src="js/controllers.js"></script>
  </head>
  <body>
  <br>
  <!-- 서치 박스 컨테이너-fluid -->
     <div class="container-fluid" ng-show="ngShowLists">
       <div class="jumbotron">
         <h1>The Movie List</h1>
         <div class="input-group">
           <span class="input-group-addon" id="basic-addon1">SEARCH</span>
             <input ng-model="search" autofocus placeholder="Search for Movies. (wait while data loading...)" type="text" class="form-control" aria-describedby="basic-addon1" />
         </div>
       </div> <!-- div class=jumbrotron -->
     </div>

    <!-- ng-view 를 이용한 컨트롤러 뷰 표시 영역 -->
    <div class="container" ng-view></div>
  </body>
</html>
